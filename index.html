<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: white;

            /* Gradient + texture feel */
            background: radial-gradient(circle at top, #1e3a8a, #0f172a 60%);
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 60px 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            color: #cbd5e1;
            font-size: 18px;
        }

        .tag {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 14px;
        }

        .section {
            margin-top: 50px;
        }

        .grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 20px;
            width: 250px;
            border-radius: 15px;

            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.12);
        }

        button {
            margin-top: 40px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #38bdf8;
            color: black;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
            transform: scale(1.05);
        }

        footer {
            margin-top: 60px;
            color: #94a3b8;
            font-size: 14px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Hi, I'm Ahmed 👋</h1>
        <p>Python Learner | Future Developer 🚀</p>

        <div class="tag">OOP Python</div>
        <div class="tag">Beginner Developer</div>

        <div class="section">
            <h2>My Projects</h2>

            <div class="grid">

                <div class="card">
                    <h3>🏏 Cricket Game</h3>
                    <p>OOP based beginner cricket simulation game</p>
                </div>

                <div class="card">
                    <h3>💻 More Projects</h3>
                    <p>Coming soon with GitHub uploads</p>
                </div>

            </div>
        </div>

        <button onclick="alert('Contact feature coming soon!')">
            Contact Me
        </button>

        <footer>
            © 2026 My Portfolio | Built with HTML & CSS
        </footer>

    </div>

</body>
</html>
