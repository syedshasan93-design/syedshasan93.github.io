<!DOCTYPE html>
<html>
<head>
    <title>Portfolio - Syed Sibte Hasan</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .hero p {
            color: #cbd5e1;
            font-size: 18px;
        }

        .hero img {
            width: 140px;
            border-radius: 50%;
            margin-top: 20px;
            border: 3px solid #38bdf8;
        }

        /* SECTION */
        .section {
            padding: 60px 20px;
            text-align: center;
        }

        .section h2 {
            font-size: 32px;
            margin-bottom: 30px;
        }

        /* INPUTS */
        input {
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        /* BUTTON */
        .btn {
            padding: 12px 25px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #0ea5e9;
        }

        /* PROJECTS */
        .projects {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: rgba(255,255,255,0.06);
            padding: 20px;
            width: 280px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.1);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
            font-size: 14px;
        }

    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div><b>Portfolio</b></div>
        <div>
            <a href="#home">Home</a>
            <a href="#projects">Projects</a>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero" id="home">
        <h1>Hi, I'm Syed Sibte Hasan 👋</h1>
        <p>Python Developer | OOP Learner | Future Software Engineer 🚀</p>

        <img src="https://cdn-icons-png.flaticon.com/512/1006/1006363.png" />
    </div>

    <!-- ADD PROJECT -->
    <div class="section">
        <h2>Add New Project</h2>

        <input id="title" placeholder="Project Title">
        <input id="desc" placeholder="Project Description">

        <br>
        <button class="btn" onclick="addProject()">Add Project</button>
    </div>

    <!-- PROJECTS -->
    <div class="section" id="projects">
        <h2>My Projects</h2>

        <div class="projects" id="projectContainer">
            <!-- ONLY dynamic projects will appear here -->
        </div>

    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 Syed Sibte Hasan | Built with HTML, CSS & JavaScript
    </footer>

    <!-- SCRIPT -->
    <script>
        function addProject() {
            let title = document.getElementById("title").value;
            let desc = document.getElementById("desc").value;

            if(title === "" || desc === "") {
                alert("Please fill both fields");
                return;
            }

            let container = document.getElementById("projectContainer");

            let card = document.createElement("div");
            card.className = "card";

            card.innerHTML = "<h3>" + title + "</h3><p>" + desc + "</p>";

            container.appendChild(card);

            document.getElementById("title").value = "";
            document.getElementById("desc").value = "";
        }
    </script>

</body>
</html>
